<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamer.bot Viewer Avatars</title>
  <style>
    :root {
      --ground: 24px;
      --status-bg: rgba(0,0,0,0.6);
      --bubble-bg: rgba(20,20,26,0.96);
      --bubble-border: rgba(255,255,255,0.12);
      --name-bg: rgba(0,0,0,0.62);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    #overlay {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      background: transparent;
    }

    #world {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    #status {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 9999;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 12px;
      color: #fff;
      background: var(--status-bg);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(6px);
    }

    .avatar {
      position: absolute;
      width: 92px;
      height: 130px;
      bottom: var(--ground);
      left: 0;
      will-change: left, bottom;
      user-select: none;
      pointer-events: none;
    }

    .avatar .name {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      padding: 3px 8px;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border-radius: 999px;
      background: var(--name-bg);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      z-index: 4;
    }

    .avatar .bubble {
      position: absolute;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      max-width: 280px;
      min-width: 42px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 14px;
      background: var(--bubble-bg);
      border: 1px solid var(--bubble-border);
      color: #fff;
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
      opacity: 0;
      scale: 0.92;
      transition: opacity .18s ease, scale .18s ease;
      z-index: 5;
      box-shadow: 0 8px 22px rgba(0,0,0,.22);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .avatar .bubble.show {
      opacity: 1;
      scale: 1;
    }

    .avatar .bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 12px;
      height: 12px;
      transform: translateX(-50%) rotate(45deg);
      background: var(--bubble-bg);
      border-right: 1px solid var(--bubble-border);
      border-bottom: 1px solid var(--bubble-border);
    }

    .bubble .bubble-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble .bubble-emote {
      width: 28px;
      height: 28px;
      object-fit: contain;
      vertical-align: middle;
      image-rendering: auto;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.25));
    }

    .avatar .shadow {
      position: absolute;
      left: 50%;
      bottom: -3px;
      width: 46px;
      height: 10px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: rgba(0,0,0,0.22);
      filter: blur(2px);
    }

    .avatar .spriteWrap {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 74px;
      height: 96px;
      transform: translateX(-50%);
      transform-origin: center bottom;
    }

    .avatar.facing-left .spriteWrap {
      transform: translateX(-50%) scaleX(-1);
    }

    .avatar .sprite {
      position: absolute;
      inset: 0;
    }

    .avatar.walking .spriteWrap {
      animation: walkBob .34s infinite ease-in-out;
    }

    .avatar.idle .spriteWrap {
      animation: idleFloat 2.1s infinite ease-in-out;
    }

    .avatar .pixel { position: absolute; }

    .eye {
      top: 28px;
      width: 8px;
      height: 8px;
      background: #fff;
      border: 3px solid #181145;
      box-shadow: inset 2px 0 0 rgba(0,0,0,.18);
      z-index: 3;
    }

    .eye.left { left: 23px; }
    .eye.right { left: 40px; }

    .mouth {
      left: 31px;
      top: 46px;
      width: 10px;
      height: 4px;
      background: #ff5f8f;
      border: 2px solid #000;
      z-index: 3;
      display: none;
    }

    .skin-cat .mouth,
    .skin-duck_evil .mouth,
    .skin-dude .mouth,
    .skin-girl .mouth,
    .skin-nyan .mouth,
    .skin-sponge .mouth {
      display: block;
    }

    .body-main {
      left: 16px;
      top: 18px;
      width: 42px;
      height: 46px;
      border-radius: 3px;
      background: var(--color);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 4px solid #000;
      overflow: hidden;
      image-rendering: pixelated;
      box-shadow: inset -4px 0 0 rgba(0,0,0,.18);
    }

    .body-main::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.06));
      pointer-events: none;
    }

    .shine {
      left: 21px;
      top: 24px;
      width: 7px;
      height: 18px;
      border-radius: 0;
      background: rgba(255,255,255,.14);
      pointer-events: none;
    }

    .backpack {
      left: 51px;
      top: 27px;
      width: 8px;
      height: 20px;
      border-radius: 0;
      background: color-mix(in srgb, var(--color) 72%, black);
      border: 4px solid #000;
      border-left: none;
    }

    .leg {
      width: 10px;
      height: 16px;
      bottom: 10px;
      background: var(--color);
      border: 4px solid #000;
      border-top: none;
      border-radius: 0;
    }

    .leg.left { left: 24px; }
    .leg.right { left: 40px; }

    .avatar.walking .leg.left { animation: legLeft .28s infinite ease-in-out; }
    .avatar.walking .leg.right { animation: legRight .28s infinite ease-in-out; }

    .ear, .tail, .hair, .glasses, .tie, .cape, .badge, .beak, .evil-eye {
      display: none;
    }

    .skin-cat .ear, .skin-cat .tail,
    .skin-owl .ear,
    .skin-nyan .tail,
    .skin-girl .hair,
    .skin-senior .hair,
    .skin-nerd .glasses,
    .skin-agent .tie,
    .skin-sith .cape,
    .skin-sponge .badge,
    .skin-duck .beak,
    .skin-duck_evil .beak,
    .skin-duck_evil .evil-eye {
      display: block;
    }

    .ear.left, .ear.right {
      top: 9px;
      width: 8px;
      height: 12px;
      background: #fff;
      border: 4px solid #000;
      border-bottom: none;
      border-radius: 0;
    }

    .ear.left { left: 21px; rotate: 0deg; }
    .ear.right { left: 43px; rotate: 0deg; }

    .tail {
      right: 6px;
      top: 46px;
      width: 12px;
      height: 4px;
      border-radius: 0;
      background: var(--color);
      border: 3px solid #000;
      rotate: 0deg;
      transform-origin: left center;
    }

    .hair {
      left: 18px;
      top: 12px;
      width: 34px;
      height: 10px;
      border-radius: 0;
      background: #7c3f00;
      border: 3px solid #000;
      border-bottom: none;
      z-index: 1;
    }

    .skin-senior .hair {
      background: #d1d5db;
      height: 12px;
    }

    .glasses {
      left: 22px;
      top: 28px;
      width: 20px;
      height: 10px;
      border: 3px solid #111827;
      border-radius: 0;
      z-index: 3;
      pointer-events: none;
    }

    .glasses::before {
      content: "";
      position: absolute;
      left: 6px;
      top: -1px;
      width: 2px;
      height: 10px;
      background: #111827;
    }

    .tie {
      left: 33px;
      top: 43px;
      width: 5px;
      height: 16px;
      background: #1f2937;
      clip-path: polygon(50% 0, 100% 25%, 75% 100%, 25% 100%, 0 25%);
      z-index: 3;
    }

    .cape {
      left: 25px;
      top: 28px;
      width: 28px;
      height: 34px;
      background: linear-gradient(180deg,#991b1b 0%,#4c0519 100%);
      clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
      opacity: .88;
      z-index: 0;
    }

    .badge {
      left: 28px;
      top: 38px;
      width: 18px;
      height: 18px;
      border-radius: 0;
      background: #facc15;
      border: 3px solid #000;
      box-shadow: inset 0 0 0 3px rgba(0,0,0,.1);
      z-index: 3;
    }

    .beak {
      left: 16px;
      top: 36px;
      width: 14px;
      height: 9px;
      background: #f59e0b;
      clip-path: polygon(0 0,100% 50%,0 100%);
      z-index: 3;
    }

    .evil-eye {
      left: 18px;
      top: 20px;
      width: 12px;
      height: 5px;
      background: #7f1d1d;
      border-radius: 999px;
      rotate: -10deg;
      z-index: 3;
    }

    .avatar.grown .spriteWrap {
      scale: 1.45;
    }

    .avatar.falling .spriteWrap {
      animation: none !important;
    }

    .poof {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      box-shadow:
        0 0 10px rgba(255,255,255,.8),
        18px -8px 0 2px rgba(255,255,255,.7),
        -18px -4px 0 1px rgba(255,255,255,.7),
        10px 12px 0 1px rgba(255,255,255,.65),
        -12px 10px 0 2px rgba(255,255,255,.65);
      pointer-events: none;
      animation: poof .55s ease-out forwards;
      z-index: 20;
    }

    @keyframes walkBob {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-3px); }
    }

    @keyframes idleFloat {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-2px); }
    }

    @keyframes legLeft {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(2px); }
    }

    @keyframes legRight {
      0%,100% { transform: translateY(2px); }
      50% { transform: translateY(0); }
    }

    @keyframes poof {
      0% { opacity: 1; transform: scale(.5); }
      100% { opacity: 0; transform: scale(2.6); }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="status">Connecting to Streamer.bot…</div>
    <div id="world"></div>
  </div>

  <script>
    const CONFIG = {
      wsUrl: "ws://127.0.0.1:8080/",
      reconnectMs: 3000,
      bubbleMs: 3600,
      showStatus: true,
      maxAvatars: 150,
      leftBound: 16,
      rightPadding: 96,
      speedMin: 0.08,
      speedMax: 0.16,
      gravity: 0.55,
      pendingRaidMarkMs: 20000,
      presentMissThreshold: 3,
      hiddenUsers: ["streamelements", "nightbot", "moobot", "soundalerts", "streamlabs"]
    };

    const namedColors = {
      white:"#ffffff", gray:"#9ca3af", black:"#111827", brown:"#8b5a2b", olive:"#6b8e23",
      green:"#16a34a", lime:"#84cc16", yellow:"#facc15", cyan:"#06b6d4", blue:"#3b82f6",
      purple:"#8b5cf6", maroon:"#7f1d1d", pink:"#ec4899", red:"#ef4444", orange:"#f97316"
    };

    const palette = Object.values(namedColors);
    const skins = ["agent","cat","duck","duck_evil","dude","girl","nerd","nyan","owl","senior","sith","sponge"];
    const fallbackAvatar = "https://static-cdn.jtvnw.net/jtv_user_pictures/xarth/404_user_70x70.png";

    const world = document.getElementById("world");
    const statusEl = document.getElementById("status");
    const avatars = new Map(); // key = lowercase username
    const avatarUrlCache = new Map();
    const presentState = new Map();

    let ws = null;
    let lastFrame = performance.now();
    let pendingRaidCount = 0;
    let pendingRaidUntil = 0;

    function setStatus(text) {
      if (!CONFIG.showStatus) {
        statusEl.style.display = "none";
        return;
      }
      statusEl.style.display = "block";
      statusEl.textContent = text;
    }

    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function maxX() { return Math.max(CONFIG.leftBound, window.innerWidth - CONFIG.rightPadding); }
    function sanitizeUser(user) { return String(user || "").trim(); }
    function normalizeUser(user) { return sanitizeUser(user).toLowerCase(); }
    function hiddenUser(user) { return CONFIG.hiddenUsers.includes(normalizeUser(user)); }

    function hashString(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
      }
      return Math.abs(h >>> 0);
    }

    function seededChoice(key, arr) { return arr[hashString(key) % arr.length]; }
    function seededColor(name) { return seededChoice(name, palette); }
    function seededSkin(name) { return seededChoice(name + ":skin", skins); }

    async function resolveAvatarUrl(username) {
      const key = normalizeUser(username);
      if (avatarUrlCache.has(key)) return avatarUrlCache.get(key);

      try {
        const response = await fetch(`https://decapi.me/twitch/avatar/${encodeURIComponent(username)}`);
        const text = (await response.text()).trim();
        const finalUrl = text.startsWith("http") ? text : fallbackAvatar;
        avatarUrlCache.set(key, finalUrl);
        return finalUrl;
      } catch {
        avatarUrlCache.set(key, fallbackAvatar);
        return fallbackAvatar;
      }
    }

    async function applyAvatarBody(username, avatar) {
      const url = await resolveAvatarUrl(username);
      avatar.bodyMain.style.backgroundImage = `url("${url.replace(/"/g, '%22')}")`;
      avatar.bodyMain.style.backgroundColor = avatar.color;
    }

    function extractUsersFromPresentList(rawUsers) {
      const result = [];
      if (!Array.isArray(rawUsers)) return result;

      for (const entry of rawUsers) {
        if (!entry) continue;
        let name = "";
        if (typeof entry === "string") name = entry;
        else if (typeof entry === "object") name = entry.display || entry.displayName || entry.userName || entry.username || entry.login || entry.name || "";
        name = sanitizeUser(name);
        if (name && !hiddenUser(name)) result.push(name);
      }
      return result;
    }

    function createPoof(x, y) {
      const p = document.createElement("div");
      p.className = "poof";
      p.style.left = `${x}px`;
      p.style.top = `${y}px`;
      world.appendChild(p);
      setTimeout(() => p.remove(), 650);
    }

    function updateFacing(avatar) {
      avatar.el.classList.toggle("facing-left", avatar.direction < 0);
    }

    function updateAvatarPosition(avatar) {
      avatar.el.style.left = `${avatar.x}px`;
      avatar.el.style.bottom = `calc(var(--ground) + ${avatar.y}px)`;
      updateFacing(avatar);
    }

    function renderBubbleContent(container, message, emotes) {
      container.innerHTML = "";
      const text = String(message || "");

      if (!Array.isArray(emotes) || emotes.length === 0) {
        const span = document.createElement("span");
        span.className = "bubble-text";
        span.textContent = text;
        container.appendChild(span);
        return;
      }

      const normalized = emotes
        .map(e => ({
          start: Number(e.start),
          end: Number(e.end),
          id: String(e.id || ""),
          code: String(e.code || "")
        }))
        .filter(e => Number.isFinite(e.start) && Number.isFinite(e.end) && e.id)
        .sort((a, b) => a.start - b.start);

      if (normalized.length === 0) {
        const span = document.createElement("span");
        span.className = "bubble-text";
        span.textContent = text;
        container.appendChild(span);
        return;
      }

      let cursor = 0;
      for (const emote of normalized) {
        if (emote.start > cursor) {
          const span = document.createElement("span");
          span.className = "bubble-text";
          span.textContent = text.slice(cursor, emote.start);
          container.appendChild(span);
        }

        const img = document.createElement("img");
        img.className = "bubble-emote";
        img.alt = emote.code || text.slice(emote.start, emote.end + 1) || "emote";
        img.src = `https://static-cdn.jtvnw.net/emoticons/v2/${encodeURIComponent(emote.id)}/default/dark/2.0`;
        container.appendChild(img);
        cursor = emote.end + 1;
      }

      if (cursor < text.length) {
        const span = document.createElement("span");
        span.className = "bubble-text";
        span.textContent = text.slice(cursor);
        container.appendChild(span);
      }
    }

    function showBubble(avatar, message, emotes = [], ms = CONFIG.bubbleMs) {
      const bubble = avatar.el.querySelector(".bubble");
      renderBubbleContent(bubble, message, emotes);
      bubble.classList.add("show");
      clearTimeout(avatar.bubbleTimer);
      avatar.bubbleTimer = setTimeout(() => bubble.classList.remove("show"), ms);
    }

    function setSkin(avatar, skin) {
      const chosen = String(skin || "").toLowerCase();
      if (!skins.includes(chosen)) return;
      for (const s of skins) avatar.el.classList.remove(`skin-${s}`);
      avatar.skin = chosen;
      avatar.el.classList.add(`skin-${chosen}`);
    }

    function setColor(avatar, color) {
      const c = String(color || "").trim().toLowerCase();
      avatar.color = namedColors[c] || (/^#[0-9a-f]{3,8}$/i.test(c) ? c : seededColor(avatar.username));
      avatar.el.style.setProperty("--color", avatar.color);
      avatar.bodyMain.style.backgroundColor = avatar.color;
    }

    function spawnX() {
      const used = [...avatars.values()].map(a => a.x).sort((a, b) => a - b);
      if (!used.length) return clamp(window.innerWidth / 2, CONFIG.leftBound, maxX());

      let bestGap = -1;
      let best = CONFIG.leftBound;
      let prev = CONFIG.leftBound;

      for (const u of used) {
        const gap = u - prev;
        if (gap > bestGap) {
          bestGap = gap;
          best = prev + gap / 2;
        }
        prev = u;
      }

      const endGap = maxX() - prev;
      if (endGap > bestGap) best = prev + endGap / 2;

      return clamp(best, CONFIG.leftBound, maxX());
    }

    function createAvatar(username, opts = {}) {
      const displayName = sanitizeUser(username);
      const key = normalizeUser(displayName);
      if (avatars.has(key)) return avatars.get(key);

      if (avatars.size >= CONFIG.maxAvatars) {
        const oldest = [...avatars.values()].sort((a, b) => a.createdAt - b.createdAt)[0];
        if (oldest) removeAvatar(oldest.username, false);
      }

      const el = document.createElement("div");
      el.className = `avatar idle skin-${opts.skin || seededSkin(displayName)}`;
      el.innerHTML = `
        <div class="name"></div>
        <div class="bubble"></div>
        <div class="shadow"></div>
        <div class="spriteWrap">
          <div class="sprite">
            <div class="pixel cape"></div>
            <div class="pixel ear left"></div>
            <div class="pixel ear right"></div>
            <div class="pixel tail"></div>
            <div class="pixel hair"></div>
            <div class="pixel backpack"></div>
            <div class="pixel body-main"></div>
            <div class="pixel shine"></div>
            <div class="pixel eye left"></div>
            <div class="pixel eye right"></div>
            <div class="pixel mouth"></div>
            <div class="pixel glasses"></div>
            <div class="pixel tie"></div>
            <div class="pixel badge"></div>
            <div class="pixel beak"></div>
            <div class="pixel evil-eye"></div>
            <div class="pixel leg left"></div>
            <div class="pixel leg right"></div>
          </div>
        </div>
      `;

      el.querySelector(".name").textContent = displayName;
      world.appendChild(el);

      const avatar = {
        key,
        username: displayName,
        el,
        bodyMain: el.querySelector(".body-main"),
        x: spawnX(),
        y: opts.spawnFall ? Math.max(220, window.innerHeight * 0.55) : 0,
        vy: 0,
        direction: Math.random() > 0.5 ? 1 : -1,
        speed: rand(CONFIG.speedMin, CONFIG.speedMax),
        targetX: null,
        createdAt: Date.now(),
        bubbleTimer: null,
        grown: false,
        color: seededColor(displayName),
        skin: opts.skin || seededSkin(displayName),
        isRaider: !!opts.isRaider
      };

      avatars.set(key, avatar);
      setColor(avatar, avatar.color);
      setSkin(avatar, avatar.skin);
      avatar.el.classList.toggle("falling", avatar.y > 0);
      updateAvatarPosition(avatar);
      applyAvatarBody(displayName, avatar);

      if (!opts.silent) showBubble(avatar, displayName, [], 1200);
      return avatar;
    }

    function removeAvatar(username, poof = true) {
      const key = normalizeUser(username);
      const avatar = avatars.get(key);
      if (!avatar) return;

      clearTimeout(avatar.bubbleTimer);
      if (poof) createPoof(avatar.x + 44, window.innerHeight - 62 - avatar.y);
      avatar.el.remove();
      avatars.delete(key);
      presentState.delete(key);
    }

    function patrolAvatar(avatar) {
      avatar.targetX = avatar.direction > 0 ? maxX() : CONFIG.leftBound;
      avatar.el.classList.remove("idle");
      avatar.el.classList.add("walking");
      updateFacing(avatar);
    }

    function getAvatar(username) {
      return avatars.get(normalizeUser(username)) || null;
    }

    function handleChat(user, message, emotes = []) {
      const displayName = sanitizeUser(user);
      if (!displayName || hiddenUser(displayName)) return;

      let avatar = getAvatar(displayName);
      const isNew = !avatar;

      if (!avatar) {
        const isRaider = pendingRaidCount > 0 && Date.now() < pendingRaidUntil;
        avatar = createAvatar(displayName, { spawnFall: true, isRaider });
        if (isRaider) pendingRaidCount = Math.max(0, pendingRaidCount - 1);
      } else if (avatar.username !== displayName) {
        avatar.username = displayName;
        avatar.el.querySelector(".name").textContent = displayName;
      }

      if (avatar.grown) {
        avatar.grown = false;
        avatar.el.classList.remove("grown");
      }

      const text = String(message || "").trim();
      if (text || (Array.isArray(emotes) && emotes.length)) showBubble(avatar, text, emotes, CONFIG.bubbleMs);

      const lower = text.toLowerCase();
      if (lower === "!grow") {
        avatar.grown = true;
        avatar.el.classList.add("grown");
        showBubble(avatar, "!grow", [], CONFIG.bubbleMs);
      } else if (lower === "!jump") {
        avatar.vy = Math.max(avatar.vy, 8.2);
      } else if (lower.startsWith("!skin ")) {
        setSkin(avatar, lower.replace("!skin ", "").trim());
      } else if (lower.startsWith("!color ")) {
        setColor(avatar, lower.replace("!color ", "").trim());
      }

      if (isNew || avatar.targetX == null) patrolAvatar(avatar);
    }

    function applyViewerList(names) {
      const now = Date.now();
      const nextSet = new Set(names.map(normalizeUser));

      // Mark everyone seen in the latest Present Viewers payload
      for (const name of names) {
        const key = normalizeUser(name);
        presentState.set(key, { lastSeen: now, misses: 0 });

        if (!avatars.has(key)) {
          const isRaider = pendingRaidCount > 0 && Date.now() < pendingRaidUntil;
          createAvatar(name, { spawnFall: true, isRaider, silent: true });
          if (isRaider) pendingRaidCount = Math.max(0, pendingRaidCount - 1);
        }
      }

      // Do NOT instantly remove avatars that are missing from one Present Viewers update.
      // Twitch/Streamer.bot can briefly omit users during refreshes, so wait a few misses first.
      for (const [key, avatar] of avatars) {
        if (nextSet.has(key)) continue;

        const state = presentState.get(key) || { lastSeen: now, misses: 0 };
        state.misses += 1;
        presentState.set(key, state);

        if (state.misses >= CONFIG.presentMissThreshold) {
          removeAvatar(avatar.username, true);
          presentState.delete(key);
        }
      }
    }

    function handlePresentPayload(payload) {
      const names = extractUsersFromPresentList(payload.users || payload.viewers || payload.list || []);
      applyViewerList(names);
    }

    function handleRaidPayload(payload) {
      const count = Number(payload.viewers || payload.count || 0);
      if (count > 0) {
        pendingRaidCount = count;
        pendingRaidUntil = Date.now() + CONFIG.pendingRaidMarkMs;
      }
    }

    function connect() {
      setStatus("Connecting to Streamer.bot…");
      ws = new WebSocket(CONFIG.wsUrl);

      ws.onopen = () => {
        setStatus("Connected. Subscribing…");
        ws.send(JSON.stringify({
          request: "Subscribe",
          id: "viewer-overlay-sub",
          events: { General: ["Custom"] }
        }));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          if (msg.id === "viewer-overlay-sub" && msg.status === "ok") {
            setStatus("Subscribed to General.Custom");
            return;
          }

          if (!(msg.event && msg.event.source === "General" && msg.event.type === "Custom")) return;

          let payload = msg.data;
          if (typeof payload === "string") {
            try { payload = JSON.parse(payload); } catch { return; }
          }

          if (!payload || !payload.type) return;

          if (payload.type === "chat") handleChat(payload.user, payload.message || "", payload.emotes || []);
          if (payload.type === "present_viewers") handlePresentPayload(payload);
          if (payload.type === "raid") handleRaidPayload(payload);
        } catch (err) {
          console.error("Bad websocket payload", err, event.data);
        }
      };

      ws.onerror = () => setStatus("WebSocket error");
      ws.onclose = () => {
        setStatus("Disconnected. Retrying…");
        setTimeout(connect, CONFIG.reconnectMs);
      };
    }

    function animate(now) {
      const dt = Math.min(32, now - lastFrame);
      lastFrame = now;

      for (const avatar of avatars.values()) {
        if (avatar.y > 0 || avatar.vy > 0) {
          avatar.vy -= CONFIG.gravity;
          avatar.y += avatar.vy;

          if (avatar.y <= 0) {
            avatar.y = 0;
            avatar.vy = 0;
            avatar.el.classList.remove("falling");
            patrolAvatar(avatar);
          }
        }

        if (avatar.y === 0) {
          if (avatar.targetX == null) patrolAvatar(avatar);

          const dx = avatar.targetX - avatar.x;
          const dist = Math.abs(dx);

          if (dist > 0.5) {
            const step = Math.min(dist, avatar.speed * dt * (avatar.grown ? 0.74 : 1));
            avatar.x += Math.sign(dx) * step;
            avatar.direction = dx > 0 ? 1 : -1;
            avatar.el.classList.remove("idle");
            avatar.el.classList.add("walking");
          } else {
            avatar.x = avatar.targetX;
            avatar.direction *= -1;
            patrolAvatar(avatar);
          }
        }

        avatar.x = clamp(avatar.x, CONFIG.leftBound, maxX());
        updateAvatarPosition(avatar);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      for (const avatar of avatars.values()) {
        avatar.x = clamp(avatar.x, CONFIG.leftBound, maxX());
        if (avatar.targetX != null) avatar.targetX = clamp(avatar.targetX, CONFIG.leftBound, maxX());
        updateAvatarPosition(avatar);
      }
    });

    connect();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
